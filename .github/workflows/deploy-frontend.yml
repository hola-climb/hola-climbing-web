name: Deploy Frontend

# main 에 push 되면 빌드 후 Nginx VM 으로 dist 업로드
on:
  push:
    branches: [main]
    paths-ignore:
      - "ios/**" # 네이티브 변경은 웹 배포와 무관
      - "**.md"

# 동시에 여러 배포가 겹치지 않도록 (마지막 push 만 반영)
concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build (production)
        run: npm run build # 웹은 API_BASE를 /api로 하드코딩 → VITE_API_BASE_URL 불필요
        env:
          # .env.production 은 gitignore 라 CI 에는 없음. Faro collector URL 은
          # 클라이언트 JS 에 노출되는 공개 키이므로 워크플로우에 직접 주입한다.
          VITE_FARO_URL: https://faro-collector-prod-ap-northeast-0.grafana.net/collect/eddfec18f71f62e8fd1a5c19e6e23778
          VITE_APP_VERSION: 0.1.0
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_KAKAO_CLIENT_ID: ${{ secrets.VITE_KAKAO_CLIENT_ID }}
          VITE_NAVER_CLIENT_ID: ${{ secrets.VITE_NAVER_CLIENT_ID }}
          VITE_KAKAO_MAP_KEY: ${{secrets.VITE_KAKAO_MAP_KEY}}
          # Firebase 웹 푸시(FCM) — 모두 클라이언트 JS 에 노출되는 공개 식별자라 직접 주입.
          # (public/firebase-messaging-sw.js 에도 동일 값이 하드코딩돼 있어야 한다)
          VITE_FB_API_KEY: AIzaSyD4V6dZjM-ICFyVqH7oD9bXfuEyc-pqSmQ
          VITE_FB_AUTH_DOMAIN: hola-climbing-fcm.firebaseapp.com
          VITE_FB_PROJECT_ID: hola-climbing-fcm
          VITE_FB_MESSAGING_SENDER_ID: "839865423692"
          VITE_FB_APP_ID: "1:839865423692:web:2a6567ebccd8150e2a21e9"
          VITE_FB_VAPID_KEY: BKls8_Qt4sdkWatLAVX7_gG-Kk4pwRB5vKoZ4Gx5YvgS4wU3aHfFoeDl8bMjjWJNzr3Ci7VGntWI0GSez7x4Ucs

      - name: Upload dist to Nginx VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "dist/*"
          target: "/var/www/hola/dist"
          strip_components: 1 # 앞의 dist/ 를 떼고 target 바로 아래로
          rm: true # 업로드 전 기존 파일 정리 (해시 파일 누적 방지)
